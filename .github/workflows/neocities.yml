name: Deploy to Neocities

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to neocities
        uses: bcomnes/deploy-to-neocities@v1
        with:
          api-token: ${{ secrets.NEOCITIES_API_TOKEN }}
          cleanup: true
